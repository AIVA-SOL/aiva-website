<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AIVA — Logo Kit</title>
<style>
  :root{
    --bg:#04060f;--bg2:#080d1e;--bg3:#0d1530;
    --accent:#4f8eff;--accent2:#a78bfa;--accent3:#34d399;
    --text:#e2e8f0;--muted:#94a3b8;--border:rgba(79,142,255,0.2);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      radial-gradient(ellipse 70% 40% at 20% 10%,rgba(79,142,255,.08),transparent),
      radial-gradient(ellipse 50% 30% at 80% 80%,rgba(167,139,250,.07),transparent);
  }

  /* ── TOPBAR ── */
  .topbar{
    position:sticky;top:0;z-index:50;
    padding:16px 40px;display:flex;align-items:center;justify-content:space-between;
    background:rgba(4,6,15,.9);backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
  }
  .topbar .logo{
    font-size:1.3rem;font-weight:900;letter-spacing:.1em;
    background:linear-gradient(135deg,#4f8eff,#a78bfa);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  }
  .topbar .sub{font-size:.78rem;color:var(--muted);}
  .back-btn{
    display:inline-flex;align-items:center;gap:6px;
    padding:8px 18px;border-radius:99px;border:1px solid var(--border);
    background:rgba(79,142,255,.08);color:var(--accent);
    font-size:.8rem;font-weight:600;cursor:pointer;text-decoration:none;
    transition:all .2s;
  }
  .back-btn:hover{background:rgba(79,142,255,.18);}

  /* ── HERO ── */
  .hero{text-align:center;padding:60px 20px 40px;position:relative;z-index:1;}
  .hero h1{
    font-size:clamp(2rem,5vw,3.2rem);font-weight:900;
    background:linear-gradient(135deg,#fff 30%,#a78bfa 65%,#4f8eff);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    margin-bottom:12px;
  }
  .hero p{color:var(--muted);font-size:1rem;max-width:500px;margin:0 auto;}

  /* ── GRID ── */
  .grid{
    max-width:1100px;margin:0 auto;padding:20px 24px 80px;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:28px;
    position:relative;z-index:1;
  }

  /* ── LOGO CARD ── */
  .logo-card{
    background:linear-gradient(145deg,var(--bg2),var(--bg3));
    border:1px solid var(--border);border-radius:20px;
    padding:28px 24px;transition:transform .3s,box-shadow .3s;
    display:flex;flex-direction:column;align-items:center;gap:20px;
  }
  .logo-card:hover{transform:translateY(-6px);box-shadow:0 20px 60px rgba(79,142,255,.15);}
  .logo-card .card-title{font-size:.95rem;font-weight:700;color:#fff;text-align:center;}
  .logo-card .card-desc{font-size:.78rem;color:var(--muted);text-align:center;line-height:1.5;}
  canvas.logo-canvas{border-radius:16px;display:block;}

  /* ── DOWNLOAD BUTTONS ── */
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .dl-btn{
    display:inline-flex;align-items:center;gap:6px;
    padding:8px 16px;border-radius:99px;border:none;cursor:pointer;
    font-size:.78rem;font-weight:700;letter-spacing:.03em;
    transition:all .2s;text-decoration:none;
  }
  .dl-btn.primary{background:linear-gradient(135deg,#4f8eff,#a78bfa);color:#fff;}
  .dl-btn.primary:hover{opacity:.85;transform:scale(1.04);}
  .dl-btn.ghost{background:rgba(79,142,255,.1);border:1px solid var(--border);color:var(--accent);}
  .dl-btn.ghost:hover{background:rgba(79,142,255,.2);}

  /* ── SIZES STRIP ── */
  .sizes{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
  .size-tag{
    font-size:.68rem;padding:3px 9px;border-radius:99px;
    background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);
    color:var(--accent3);font-weight:600;
  }

  /* ── TIP BOX ── */
  .tip-box{
    max-width:700px;margin:0 auto 48px;padding:20px 28px;
    background:rgba(79,142,255,.06);border:1px solid rgba(79,142,255,.2);
    border-radius:14px;font-size:.85rem;color:var(--muted);line-height:1.7;
    position:relative;z-index:1;text-align:center;
  }
  .tip-box strong{color:var(--accent);}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div>
    <div class="logo">AIVA</div>
    <div class="sub">Logo Kit · Brand Assets</div>
  </div>
  <a href="whitepaper.html" class="back-btn">← White Paper</a>
</header>

<!-- HERO -->
<div class="hero">
  <h1>AIVA Logo Kit</h1>
  <p>6款专业品牌图标，点击下载按钮即可保存 PNG，直接用于推特、Discord、Telegram头像。</p>
</div>

<!-- TIP -->
<div class="tip-box">
  💡 <strong>使用提示：</strong>推特/X头像推荐 <strong>400×400</strong>，Discord 推荐 <strong>512×512</strong>，Telegram 推荐 <strong>512×512</strong>。
  点击「⬇ 下载 PNG」即可保存高清图标，所有图标均为圆形友好设计。
</div>

<!-- LOGO GRID -->
<div class="grid" id="logoGrid">
  <!-- Cards injected by JS -->
</div>

<script>
// ═══════════════════════════════════════════════════════
// LOGO DEFINITIONS
// ═══════════════════════════════════════════════════════
const LOGOS = [
  {
    id:'logo1', title:'🔵 极光蓝 · 主视觉',
    desc:'主品牌标识，渐变蓝紫背景配发光AIVA字样，适合所有主要平台头像',
    sizes:['Twitter/X','Discord','Telegram'],
    draw(ctx, S) {
      const cx = S/2, cy = S/2, r = S/2;
      // BG
      const bg = ctx.createRadialGradient(cx*0.6,cy*0.5,0,cx,cy,r);
      bg.addColorStop(0,'#0d1a40');
      bg.addColorStop(0.6,'#06091a');
      bg.addColorStop(1,'#020408');
      ctx.fillStyle = bg; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();

      // Glow rings
      for(let i=3;i>0;i--){
        ctx.beginPath();
        ctx.arc(cx,cy,r*0.55*i/3+r*0.1,0,Math.PI*2);
        ctx.strokeStyle=`rgba(79,142,255,${0.04*i})`;
        ctx.lineWidth=S*0.04*i; ctx.stroke();
      }

      // Hexagon bg shape
      ctx.save();
      ctx.translate(cx,cy);
      ctx.beginPath();
      for(let i=0;i<6;i++){
        const a=Math.PI/180*(60*i-30);
        i===0?ctx.moveTo(Math.cos(a)*r*0.7,Math.sin(a)*r*0.7)
             :ctx.lineTo(Math.cos(a)*r*0.7,Math.sin(a)*r*0.7);
      }
      ctx.closePath();
      const hexG=ctx.createLinearGradient(-r*0.5,-r*0.5,r*0.5,r*0.5);
      hexG.addColorStop(0,'rgba(79,142,255,0.18)');
      hexG.addColorStop(1,'rgba(167,139,250,0.12)');
      ctx.fillStyle=hexG; ctx.fill();
      ctx.strokeStyle='rgba(79,142,255,0.5)'; ctx.lineWidth=S*0.006; ctx.stroke();
      ctx.restore();

      // Center glow blob
      const blob=ctx.createRadialGradient(cx,cy,0,cx,cy,r*0.38);
      blob.addColorStop(0,'rgba(79,142,255,0.35)');
      blob.addColorStop(0.5,'rgba(167,139,250,0.15)');
      blob.addColorStop(1,'transparent');
      ctx.fillStyle=blob; ctx.beginPath(); ctx.arc(cx,cy,r*0.38,0,Math.PI*2); ctx.fill();

      // AI circuit dots
      const pts=[[0.35,0.25],[0.65,0.25],[0.78,0.5],[0.65,0.75],[0.35,0.75],[0.22,0.5]];
      pts.forEach(([px,py],i)=>{
        const x=px*S,y=py*S;
        ctx.beginPath(); ctx.arc(x,y,S*0.016,0,Math.PI*2);
        ctx.fillStyle=i%2===0?'rgba(79,142,255,0.9)':'rgba(167,139,250,0.9)'; ctx.fill();
        // connect to center
        ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(cx,cy);
        ctx.strokeStyle=`rgba(79,142,255,${0.15+i*0.03})`; ctx.lineWidth=S*0.004; ctx.stroke();
      });

      // AIVA text
      ctx.textAlign='center'; ctx.textBaseline='middle';
      const fs=S*0.28;
      // Shadow/glow
      ctx.shadowColor='#4f8eff'; ctx.shadowBlur=S*0.06;
      const tg=ctx.createLinearGradient(cx-fs,cy,cx+fs,cy);
      tg.addColorStop(0,'#ffffff');
      tg.addColorStop(0.45,'#c4d8ff');
      tg.addColorStop(1,'#a78bfa');
      ctx.font=`900 ${fs}px 'Segoe UI',Arial,sans-serif`;
      ctx.fillStyle=tg; ctx.fillText('AIVA',cx,cy);
      ctx.shadowBlur=0;

      // Tagline
      ctx.font=`600 ${S*0.055}px 'Segoe UI',Arial,sans-serif`;
      ctx.fillStyle='rgba(148,163,184,0.8)';
      ctx.fillText('AI VALUE AGENT',cx,cy+S*0.215);

      // Bottom dot accent
      for(let i=0;i<3;i++){
        ctx.beginPath(); ctx.arc(cx+(i-1)*S*0.07,cy+S*0.29,S*0.012,0,Math.PI*2);
        ctx.fillStyle=i===1?'#4f8eff':'rgba(79,142,255,0.4)'; ctx.fill();
      }
    }
  },

  {
    id:'logo2', title:'💜 星云紫 · 神秘风',
    desc:'深紫宇宙背景，粒子光晕环绕，神秘高端，适合Web3社区氛围',
    sizes:['Twitter/X','NFT PFP','Discord'],
    draw(ctx, S) {
      const cx=S/2, cy=S/2;
      // Deep space BG
      const bg=ctx.createRadialGradient(cx*0.7,cy*0.5,0,cx,cy,S/2);
      bg.addColorStop(0,'#120820');
      bg.addColorStop(0.5,'#0a0415');
      bg.addColorStop(1,'#050208');
      ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(cx,cy,S/2,0,Math.PI*2); ctx.fill();

      // Stars
      const rand=(seed)=>{let x=Math.sin(seed)*10000;return x-Math.floor(x);};
      for(let i=0;i<80;i++){
        const x=rand(i*3)*S, y=rand(i*7)*S;
        const sr=rand(i*13)*S*0.006+S*0.002;
        ctx.beginPath(); ctx.arc(x,y,sr,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${rand(i*17)*0.6+0.2})`; ctx.fill();
      }

      // Outer glow ring
      for(let i=0;i<4;i++){
        ctx.beginPath(); ctx.arc(cx,cy,S*0.36+i*S*0.04,0,Math.PI*2);
        ctx.strokeStyle=`rgba(167,139,250,${0.12-i*0.025})`;
        ctx.lineWidth=S*0.022; ctx.stroke();
      }

      // Purple nebula
      const neb=ctx.createRadialGradient(cx,cy,0,cx,cy,S*0.32);
      neb.addColorStop(0,'rgba(167,139,250,0.3)');
      neb.addColorStop(0.4,'rgba(139,92,246,0.15)');
      neb.addColorStop(1,'transparent');
      ctx.fillStyle=neb; ctx.beginPath(); ctx.arc(cx,cy,S*0.32,0,Math.PI*2); ctx.fill();

      // Orbit arc
      ctx.beginPath();
      ctx.ellipse(cx,cy,S*0.38,S*0.15,Math.PI/6,0,Math.PI*2);
      ctx.strokeStyle='rgba(167,139,250,0.4)'; ctx.lineWidth=S*0.005; ctx.stroke();

      // Orbit planet dot
      const oa=-Math.PI*0.3;
      ctx.beginPath();
      ctx.arc(cx+Math.cos(oa)*S*0.38,cy+Math.sin(oa)*S*0.15,S*0.025,0,Math.PI*2);
      ctx.fillStyle='#a78bfa'; ctx.fill();

      // AIVA text
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.shadowColor='#a78bfa'; ctx.shadowBlur=S*0.08;
      const tg=ctx.createLinearGradient(cx-S*0.25,0,cx+S*0.25,0);
      tg.addColorStop(0,'#e2ccff');
      tg.addColorStop(0.5,'#ffffff');
      tg.addColorStop(1,'#c4b5fd');
      ctx.font=`900 ${S*0.27}px 'Segoe UI',Arial,sans-serif`;
      ctx.fillStyle=tg; ctx.fillText('AIVA',cx,cy-S*0.02);
      ctx.shadowBlur=0;

      // Subtitle
      ctx.font=`500 ${S*0.052}px 'Segoe UI',Arial,sans-serif`;
      ctx.fillStyle='rgba(196,181,253,0.75)';
      ctx.fillText('· PROTOCOL ·',cx,cy+S*0.21);

      // Small sparkles
      [[0.18,0.2],[0.82,0.22],[0.15,0.78],[0.84,0.76]].forEach(([px,py])=>{
        const x=px*S,y=py*S,ss=S*0.018;
        ctx.strokeStyle='rgba(167,139,250,0.7)'; ctx.lineWidth=S*0.004;
        ctx.beginPath();ctx.moveTo(x-ss,y);ctx.lineTo(x+ss,y);ctx.stroke();
        ctx.beginPath();ctx.moveTo(x,y-ss);ctx.lineTo(x,y+ss);ctx.stroke();
      });
    }
  },

  {
    id:'logo3', title:'🟢 赛博绿 · 科技感',
    desc:'极客终端风格，绿色扫描线+代码雨元素，适合技术社区和开发者群体',
    sizes:['GitHub','Telegram','Discord'],
    draw(ctx, S) {
      const cx=S/2,cy=S/2;
      // Terminal dark BG
      const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,S/2);
      bg.addColorStop(0,'#051208');
      bg.addColorStop(0.7,'#020b04');
      bg.addColorStop(1,'#010302');
      ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(cx,cy,S/2,0,Math.PI*2); ctx.fill();

      // Clip to circle
      ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,S/2,0,Math.PI*2); ctx.clip();

      // Grid lines
      ctx.strokeStyle='rgba(52,211,153,0.06)'; ctx.lineWidth=1;
      for(let i=0;i<20;i++){
        ctx.beginPath();ctx.moveTo(i*S/19,0);ctx.lineTo(i*S/19,S);ctx.stroke();
        ctx.beginPath();ctx.moveTo(0,i*S/19);ctx.lineTo(S,i*S/19);ctx.stroke();
      }

      // Scan line effect
      for(let i=0;i<S;i+=S*0.04){
        ctx.fillStyle=`rgba(52,211,153,${0.03})`;
        ctx.fillRect(0,i,S,S*0.018);
      }

      // Digital rain columns
      const rand=(s)=>{let x=Math.sin(s)*9999;return x-Math.floor(x);};
      const chars='01AIVA∞∑αβ';
      ctx.font=`bold ${S*0.038}px monospace`;
      for(let col=0;col<8;col++){
        const x=rand(col*3)*S;
        for(let row=0;row<5;row++){
          const y=rand(col*7+row)*S;
          const ch=chars[Math.floor(rand(col*11+row)*chars.length)];
          ctx.fillStyle=`rgba(52,211,153,${rand(col*5+row)*0.25+0.05})`;
          ctx.fillText(ch,x,y);
        }
      }
      ctx.restore();

      // Center glow
      const glow=ctx.createRadialGradient(cx,cy,0,cx,cy,S*0.3);
      glow.addColorStop(0,'rgba(52,211,153,0.25)');
      glow.addColorStop(0.5,'rgba(52,211,153,0.08)');
      glow.addColorStop(1,'transparent');
      ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(cx,cy,S*0.3,0,Math.PI*2); ctx.fill();

      // Hexagon border
      ctx.save(); ctx.translate(cx,cy);
      ctx.beginPath();
      for(let i=0;i<6;i++){
        const a=Math.PI/3*i-Math.PI/6;
        i===0?ctx.moveTo(Math.cos(a)*S*0.37,Math.sin(a)*S*0.37)
             :ctx.lineTo(Math.cos(a)*S*0.37,Math.sin(a)*S*0.37);
      }
      ctx.closePath();
      ctx.strokeStyle='rgba(52,211,153,0.6)'; ctx.lineWidth=S*0.008; ctx.stroke();
      // Corner dots
      for(let i=0;i<6;i++){
        const a=Math.PI/3*i-Math.PI/6;
        ctx.beginPath(); ctx.arc(Math.cos(a)*S*0.37,Math.sin(a)*S*0.37,S*0.018,0,Math.PI*2);
        ctx.fillStyle='#34d399'; ctx.fill();
      }
      ctx.restore();

      // AIVA
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.shadowColor='#34d399'; ctx.shadowBlur=S*0.07;
      ctx.font=`900 ${S*0.27}px 'Courier New',monospace`;
      const tg=ctx.createLinearGradient(cx-S*0.2,0,cx+S*0.2,0);
      tg.addColorStop(0,'#34d399');
      tg.addColorStop(0.5,'#a7f3d0');
      tg.addColorStop(1,'#34d399');
      ctx.fillStyle=tg; ctx.fillText('AIVA',cx,cy-S*0.02);
      ctx.shadowBlur=0;

      ctx.font=`600 ${S*0.05}px 'Courier New',monospace`;
      ctx.fillStyle='rgba(52,211,153,0.65)';
      ctx.fillText('v1.0 // SOLANA',cx,cy+S*0.215);
    }
  },

  {
    id:'logo4', title:'🔥 烈焰金 · 尊贵感',
    desc:'黑金配色，奢华光效，彰显项目价值感，适合高端社区和KOL使用',
    sizes:['Twitter/X','KOL专属','Instagram'],
    draw(ctx, S) {
      const cx=S/2,cy=S/2;
      // Black BG
      const bg=ctx.createRadialGradient(cx*0.6,cy*0.4,0,cx,cy,S/2);
      bg.addColorStop(0,'#1a1005');
      bg.addColorStop(0.6,'#0a0802');
      bg.addColorStop(1,'#050401');
      ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(cx,cy,S/2,0,Math.PI*2); ctx.fill();

      // Gold particle dust
      const rand=(s)=>{let x=Math.sin(s)*9999;return x-Math.floor(x);};
      for(let i=0;i<60;i++){
        const x=rand(i*3)*S,y=rand(i*7)*S;
        const pr=rand(i*11)*S*0.005+S*0.002;
        ctx.beginPath(); ctx.arc(x,y,pr,0,Math.PI*2);
        ctx.fillStyle=`rgba(251,191,36,${rand(i*17)*0.5+0.1})`; ctx.fill();
      }

      // Outer gold ring
      for(let i=0;i<3;i++){
        ctx.beginPath(); ctx.arc(cx,cy,S*0.4-i*S*0.025,0,Math.PI*2);
        const rg=ctx.createLinearGradient(cx-S*0.4,cy,cx+S*0.4,cy);
        rg.addColorStop(0,'rgba(251,191,36,0.7)');
        rg.addColorStop(0.5,'rgba(255,231,128,0.9)');
        rg.addColorStop(1,'rgba(251,191,36,0.7)');
        ctx.strokeStyle=rg; ctx.lineWidth=S*(0.01-i*0.002); ctx.stroke();
      }

      // Inner glow
      const inner=ctx.createRadialGradient(cx,cy,0,cx,cy,S*0.3);
      inner.addColorStop(0,'rgba(251,191,36,0.22)');
      inner.addColorStop(0.4,'rgba(245,158,11,0.1)');
      inner.addColorStop(1,'transparent');
      ctx.fillStyle=inner; ctx.beginPath(); ctx.arc(cx,cy,S*0.3,0,Math.PI*2); ctx.fill();

      // Diamond / star shape
      ctx.save(); ctx.translate(cx,cy);
      ctx.beginPath();
      for(let i=0;i<8;i++){
        const a=Math.PI/4*i, r=i%2===0?S*0.32:S*0.2;
        i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r)
             :ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
      }
      ctx.closePath();
      ctx.strokeStyle='rgba(251,191,36,0.35)'; ctx.lineWidth=S*0.005; ctx.stroke();
      ctx.restore();

      // Crown icon above text
      ctx.save(); ctx.translate(cx,cy-S*0.18);
      const cs=S*0.055;
      ctx.beginPath();
      ctx.moveTo(-cs*1.2,cs*0.5);
      ctx.lineTo(-cs*1.2,-cs*0.2);
      ctx.lineTo(-cs*0.6,cs*0.2);
      ctx.lineTo(0,-cs*0.6);
      ctx.lineTo(cs*0.6,cs*0.2);
      ctx.lineTo(cs*1.2,-cs*0.2);
      ctx.lineTo(cs*1.2,cs*0.5);
      ctx.closePath();
      const cg=ctx.createLinearGradient(0,-cs*0.6,0,cs*0.5);
      cg.addColorStop(0,'#fde68a'); cg.addColorStop(1,'#fbbf24');
      ctx.fillStyle=cg; ctx.fill();
      // Crown jewels
      [[0,cs*0.1],[cs*0.8,-cs*0.05],[-cs*0.8,-cs*0.05]].forEach(([dx,dy])=>{
        ctx.beginPath(); ctx.arc(dx,dy,cs*0.14,0,Math.PI*2);
        ctx.fillStyle='#7c3aed'; ctx.fill();
      });
      ctx.restore();

      // AIVA text
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.shadowColor='#fbbf24'; ctx.shadowBlur=S*0.08;
      const tg=ctx.createLinearGradient(cx-S*0.25,cy,cx+S*0.25,cy);
      tg.addColorStop(0,'#fbbf24');
      tg.addColorStop(0.3,'#fde68a');
      tg.addColorStop(0.6,'#fff7ed');
      tg.addColorStop(1,'#fbbf24');
      ctx.font=`900 ${S*0.26}px 'Segoe UI',Arial,sans-serif`;
      ctx.fillStyle=tg; ctx.fillText('AIVA',cx,cy+S*0.04);
      ctx.shadowBlur=0;

      ctx.font=`600 ${S*0.048}px 'Segoe UI',Arial,sans-serif`;
      ctx.fillStyle='rgba(251,191,36,0.6)';
      ctx.fillText('· GOLD EDITION ·',cx,cy+S*0.22);
    }
  },

  {
    id:'logo5', title:'⬛ 极简黑白 · 通用版',
    desc:'高对比度纯黑白设计，在任何背景下都清晰可识，印刷和数字媒体通用',
    sizes:['全平台通用','打印','PPT'],
    draw(ctx, S) {
      const cx=S/2,cy=S/2;
      // Pure black
      ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(cx,cy,S/2,0,Math.PI*2); ctx.fill();

      // Outer circle border
      ctx.beginPath(); ctx.arc(cx,cy,S*0.44,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=S*0.012; ctx.stroke();

      ctx.beginPath(); ctx.arc(cx,cy,S*0.40,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=S*0.006; ctx.stroke();

      // Cross hatch accent
      ctx.save(); ctx.translate(cx,cy);
      for(let i=0;i<4;i++){
        ctx.beginPath();
        ctx.moveTo(0,0); ctx.lineTo(Math.cos(Math.PI/4+Math.PI/2*i)*S*0.38,Math.sin(Math.PI/4+Math.PI/2*i)*S*0.38);
        ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=S*0.005; ctx.stroke();
      }
      // Corner marks
      for(let i=0;i<4;i++){
        const a=Math.PI/4+Math.PI/2*i;
        const x=Math.cos(a)*S*0.35, y=Math.sin(a)*S*0.35;
        ctx.beginPath(); ctx.arc(x,y,S*0.02,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.fill();
      }
      ctx.restore();

      // AIVA big text
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.font=`900 ${S*0.28}px 'Segoe UI',Arial,sans-serif`;
      ctx.fillStyle='#ffffff'; ctx.fillText('AIVA',cx,cy-S*0.02);

      // Thin divider line
      ctx.beginPath();
      ctx.moveTo(cx-S*0.22,cy+S*0.145); ctx.lineTo(cx+S*0.22,cy+S*0.145);
      ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=S*0.004; ctx.stroke();

      // Tagline
      ctx.font=`400 ${S*0.048}px 'Segoe UI',Arial,sans-serif`;
      ctx.fillStyle='rgba(255,255,255,0.55)';
      ctx.fillText('AI VALUE AGENT',cx,cy+S*0.215);
    }
  },

  {
    id:'logo6', title:'🌊 深海蓝 · 专业版',
    desc:'深邃海蓝渐变，带AI神经网络纹理，彰显项目技术深度，适合官方账号',
    sizes:['官方账号','LinkedIn','媒体发稿'],
    draw(ctx, S) {
      const cx=S/2,cy=S/2;
      // Ocean deep BG
      const bg=ctx.createRadialGradient(cx*0.5,cy*0.3,0,cx,cy,S/2);
      bg.addColorStop(0,'#051832');
      bg.addColorStop(0.5,'#021020');
      bg.addColorStop(1,'#010810');
      ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(cx,cy,S/2,0,Math.PI*2); ctx.fill();

      // Wave pattern
      ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,S/2,0,Math.PI*2); ctx.clip();
      for(let i=0;i<5;i++){
        ctx.beginPath();
        ctx.moveTo(0, cy+S*0.1+i*S*0.08);
        for(let x=0;x<=S;x+=4){
          ctx.lineTo(x, cy+S*0.1+i*S*0.08+Math.sin(x*0.025+i)*S*0.025);
        }
        ctx.strokeStyle=`rgba(79,142,255,${0.06-i*0.01})`; ctx.lineWidth=S*0.012; ctx.stroke();
      }
      ctx.restore();

      // Neural network nodes
      const nodes=[
        [0.5,0.5],[0.28,0.3],[0.72,0.3],[0.2,0.55],[0.8,0.55],
        [0.3,0.73],[0.7,0.73],[0.5,0.22],[0.5,0.78]
      ];
      // Connections
      const conns=[[0,1],[0,2],[0,3],[0,4],[1,7],[2,7],[1,2],[3,5],[4,6],[5,6],[3,4],[0,8],[5,8],[6,8]];
      conns.forEach(([a,b])=>{
        const [ax,ay]=nodes[a], [bx,by]=nodes[b];
        ctx.beginPath();
        ctx.moveTo(ax*S,ay*S); ctx.lineTo(bx*S,by*S);
        ctx.strokeStyle='rgba(79,142,255,0.2)'; ctx.lineWidth=S*0.004; ctx.stroke();
      });
      // Nodes
      nodes.forEach(([nx,ny],i)=>{
        const nr=i===0?S*0.048:S*0.022;
        const ng=ctx.createRadialGradient(nx*S,ny*S,0,nx*S,ny*S,nr);
        ng.addColorStop(0,i===0?'rgba(79,142,255,0.9)':'rgba(79,142,255,0.6)');
        ng.addColorStop(1,'transparent');
        ctx.fillStyle=ng; ctx.beginPath(); ctx.arc(nx*S,ny*S,nr,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(nx*S,ny*S,nr*0.5,0,Math.PI*2);
        ctx.fillStyle=i===0?'#4f8eff':'rgba(79,142,255,0.8)'; ctx.fill();
      });

      // Blue outer glow
      const og=ctx.createRadialGradient(cx,cy,S*0.2,cx,cy,S*0.48);
      og.addColorStop(0,'transparent');
      og.addColorStop(0.7,'rgba(79,142,255,0.08)');
      og.addColorStop(1,'rgba(79,142,255,0.18)');
      ctx.fillStyle=og; ctx.beginPath(); ctx.arc(cx,cy,S*0.48,0,Math.PI*2); ctx.fill();

      // Outer ring
      ctx.beginPath(); ctx.arc(cx,cy,S*0.44,0,Math.PI*2);
      const rg=ctx.createLinearGradient(cx-S*0.44,cy,cx+S*0.44,cy);
      rg.addColorStop(0,'rgba(79,142,255,0.3)');
      rg.addColorStop(0.5,'rgba(130,170,255,0.8)');
      rg.addColorStop(1,'rgba(79,142,255,0.3)');
      ctx.strokeStyle=rg; ctx.lineWidth=S*0.01; ctx.stroke();

      // AIVA text
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.shadowColor='#4f8eff'; ctx.shadowBlur=S*0.05;
      const tg=ctx.createLinearGradient(cx,cy-S*0.12,cx,cy+S*0.05);
      tg.addColorStop(0,'#ffffff');
      tg.addColorStop(0.6,'#c4d8ff');
      tg.addColorStop(1,'#93c5fd');
      ctx.font=`900 ${S*0.26}px 'Segoe UI',Arial,sans-serif`;
      ctx.fillStyle=tg; ctx.fillText('AIVA',cx,cy-S*0.02);
      ctx.shadowBlur=0;

      // Protocol badge
      const bw=S*0.42, bh=S*0.068, bx=cx-bw/2, by=cy+S*0.17;
      ctx.fillStyle='rgba(79,142,255,0.15)';
      ctx.beginPath();
      ctx.roundRect?ctx.roundRect(bx,by,bw,bh,bh/2):ctx.rect(bx,by,bw,bh);
      ctx.fill();
      ctx.strokeStyle='rgba(79,142,255,0.4)'; ctx.lineWidth=S*0.004; ctx.stroke();
      ctx.font=`700 ${S*0.048}px 'Segoe UI',Arial,sans-serif`;
      ctx.fillStyle='rgba(147,197,253,0.9)';
      ctx.fillText('AI VALUE AGENT',cx,by+bh*0.55);
    }
  }
];

// ═══════════════════════════════════════════════════════
// RENDER & DOWNLOAD
// ═══════════════════════════════════════════════════════
const SIZES = [512, 256, 128];

function buildCard(logo) {
  const card = document.createElement('div');
  card.className = 'logo-card';

  // Canvas (display at 300px, rendered at 512px)
  const displaySize = 280;
  const renderSize = 512;
  const canvas = document.createElement('canvas');
  canvas.width = renderSize; canvas.height = renderSize;
  canvas.className = 'logo-canvas';
  canvas.style.width = displaySize + 'px';
  canvas.style.height = displaySize + 'px';
  const ctx = canvas.getContext('2d');

  // Draw to circle
  ctx.save();
  ctx.beginPath();
  ctx.arc(renderSize/2, renderSize/2, renderSize/2, 0, Math.PI*2);
  ctx.clip();
  logo.draw(ctx, renderSize);
  ctx.restore();

  // Title
  const title = document.createElement('div');
  title.className = 'card-title';
  title.textContent = logo.title;

  // Desc
  const desc = document.createElement('div');
  desc.className = 'card-desc';
  desc.textContent = logo.desc;

  // Sizes
  const sizesEl = document.createElement('div');
  sizesEl.className = 'sizes';
  logo.sizes.forEach(s => {
    const tag = document.createElement('span');
    tag.className = 'size-tag';
    tag.textContent = s;
    sizesEl.appendChild(tag);
  });

  // Buttons
  const btnRow = document.createElement('div');
  btnRow.className = 'btn-row';

  SIZES.forEach(sz => {
    const btn = document.createElement('button');
    btn.className = 'dl-btn ' + (sz === 512 ? 'primary' : 'ghost');
    btn.innerHTML = `⬇ ${sz}×${sz}`;
    btn.onclick = () => downloadLogo(logo, sz);
    btnRow.appendChild(btn);
  });

  card.appendChild(canvas);
  card.appendChild(title);
  card.appendChild(desc);
  card.appendChild(sizesEl);
  card.appendChild(btnRow);
  return card;
}

function downloadLogo(logo, size) {
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.save();
  ctx.beginPath();
  ctx.arc(size/2, size/2, size/2, 0, Math.PI*2);
  ctx.clip();
  logo.draw(ctx, size);
  ctx.restore();
  const link = document.createElement('a');
  link.download = `AIVA-${logo.id}-${size}x${size}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// Init
const grid = document.getElementById('logoGrid');
LOGOS.forEach(logo => grid.appendChild(buildCard(logo)));
</script>
